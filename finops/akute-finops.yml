description: >-
  FinOps view of Akute Health spend. Akute bills primarily per active patient
  per month against a monthly minimum, plus flat per-provider add-ons for
  additional prescribers and EPCS. REST API and webhook access are part of
  higher, sales-led (Enterprise) agreements rather than separately metered
  per-call charges. Exact API-tier pricing is negotiated and not public, so
  cost figures here are not reconciled.
notes: >-
  Per-patient rates and add-on fees are from the public pricing page and may
  change; API-access pricing is sales-led. Verify against an Akute quote during
  reconciliation.
