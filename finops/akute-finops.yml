meters:
- name: active_patients
  description: Active patients in the account, billed per patient per month against a monthly minimum.
  unit: patients
  aggregation: sum
  dimensions:
  - account
  - plan
- name: prescribers
  description: Additional prescriber seats billed at a flat monthly rate per provider.
  unit: providers
  aggregation: sum
  dimensions:
  - account
- name: epcs_providers
  description: EPCS (controlled-substance e-prescribing) providers billed at a flat monthly rate.
  unit: providers
  aggregation: sum
  dimensions:
  - account
- name: api_access
  description: REST API and webhook access bundled into the negotiated Enterprise agreement (not per-call metered publicly).
  unit: contract
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track active-patient counts and provider seats against the monthly minimum to understand effective unit cost.
- name: Allocation
  description: Map active patients and provider seats to programs, clinics, or cost centers.
- name: Optimization
  description: Right-size the plan tier and minimum to actual active-patient volume; deactivate inactive patients; consolidate prescriber seats.
- name: Accountability
  description: Assign owners per clinic/program and review monthly active-patient spend and add-on seats against budget.
