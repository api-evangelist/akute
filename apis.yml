aid: akute
url: https://raw.githubusercontent.com/api-evangelist/akute/refs/heads/main/apis.yml
name: Akute Health
kind: company
description: Akute Health is an automation-first, API- and developer-friendly EHR
  (electronic health record) platform for digital health, telehealth, direct primary
  care, and GLP-1 weight-loss clinics. Its REST API at https://api.akutehealth.com/v1
  exposes FHIR-aligned resources - patients, appointments, clinical notes, tasks,
  documents, medications and e-prescribing, lab orders and results, plus signed
  webhooks - so customers can enrich the record and build patient-facing or
  internal applications.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Healthcare
- EHR
- EMR
- FHIR
- Digital Health
- Telehealth
created: '2026-06-21'
modified: '2026-06-21'
specificationVersion: '0.19'
